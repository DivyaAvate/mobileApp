  <!-- Outer glow ring -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#00E5A0" stroke-width="8" opacity="0.15"/>
  
  <!-- Barbell left side -->
  <rect x="120" y="460" width="180" height="104" rx="20" fill="#00E5A0"/>
  <rect x="100" y="420" width="60" height="184" rx="16" fill="#00E5A0"/>
  
  <!-- Barbell right side -->
  <rect x="724" y="460" width="180" height="104" rx="20" fill="#00E5A0"/>
  <rect x="864" y="420" width="60" height="184" rx="16" fill="#00E5A0"/>
  
  <!-- Barbell bar -->
  <rect x="280" y="498" width="464" height="28" rx="14" fill="#00E5A0"/>
  
  <!-- AI spark / lightning bolt center -->
  <polygon points="512,320 468,520 504,520 492,700 556,480 516,480" fill="#3B8AFF" opacity="0.9"/>
  
